# Server Configuration
server.port=8080
spring.application.name=smartbank-pro

# PostgreSQL Database Configuration (for Render deployment)
spring.datasource.url=jdbc:${SPRING_DATASOURCE_URL:postgresql://localhost:5432/smartbank_pro}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=SmartBankProSecretKeyForJWTTokenGenerationMustBeVeryLongAndSecureForProductionUse2024
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:3000

# Logging Configuration
logging.level.com.smartbank=DEBUG
logging.level.org.springframework.security=DEBUG
