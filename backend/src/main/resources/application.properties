# Server Configuration
server.port=8080
spring.application.name=smartbank-pro

# PostgreSQL Database Configuration (for Render deployment)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/smartbank_pro}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USER:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Additional database configuration
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# JWT Configuration
jwt.secret=SmartBankProSecretKeyForJWTTokenGenerationMustBeVeryLongAndSecureForProductionUse2024
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:3000

# Logging Configuration
logging.level.com.smartbank=DEBUG
logging.level.org.springframework.security=DEBUG
