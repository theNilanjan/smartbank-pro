# Server Configuration
server.port=8080
spring.application.name=smartbank-pro

# H2 Database Configuration (in-memory database - no external setup required)
spring.datasource.url=jdbc:h2:mem:smartbank_pro
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT Configuration
jwt.secret=SmartBankProSecretKeyForJWTTokenGenerationMustBeVeryLongAndSecureForProductionUse2024
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:3000

# Logging Configuration
logging.level.com.smartbank=DEBUG
logging.level.org.springframework.security=DEBUG
