services:
  - type: web
    name: smartbank-pro-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartbank-pro-db
          property: connectionString
      - key: DATABASE_USER
        fromDatabase:
          name: smartbank-pro-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: smartbank-pro-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "86400000"

databases:
  - name: smartbank-pro-db
    databaseName: smartbank_pro
    user: smartbank_user
